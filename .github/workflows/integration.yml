name: Integration Tests

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Create API key
        id: apikey
        run: |
          # Give mumble a moment to initialise Ice before mumble_rest connects
          sleep 10
          API_KEY=$(docker compose -f docker-compose.test.yml exec -T mumble_rest \
            python manage.py shell -c \
            "from mumble_rest.models import APIKey, generate_token; k=generate_token(); APIKey.objects.create(name='ci', token=k); print(k, end='')")
          echo "::add-mask::$API_KEY"
          echo "key=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        run: bash tests/integration.sh "${{ steps.apikey.outputs.key }}"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.test.yml down
